
<!DOCTYPE html>
<html>
<head>
<title>Dear Feny ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
text-align:center;
overflow:hidden;
}

.container{
padding:30px;
}

h1{
font-size:52px;
color:white;
margin-bottom:15px;
animation:fade 2s;
}

p{
font-size:22px;
color:white;
line-height:1.8;
animation:fade 3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Dear Feny ❤️</h1>

<p>
Every heartbeat reminds me of you.<br><br>

I know I made mistakes.<br>
I am truly sorry.<br><br>

Please give me one chance to make everything right. ❤️

</p>

</div>

</body>
</html>
