<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dear Wifey ❤️</title>


<style>

#welcome{



position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
padding:20px;
}

#welcome h1{
font-size:45px;
margin-bottom:20px;
}

#welcome p{
font-size:22px;
margin-bottom:30px;
}

#welcome button{
padding:18px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border-radius:25px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
font-size:50px;
margin-bottom:30px;
}

.message{
font-size:24px;
line-height:1.9;
text-align:center;
}
  .gallery{
margin-top:40px;
display:grid;
gap:20px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.button{
display:block;
width:max-content;
margin:35px auto;
padding:16px 35px;
background:white;
color:#ff4d6d;
text-decoration:none;
font-size:22px;
font-weight:bold;
border-radius:40px;
transition:.3s;
}

.button:hover{
transform:scale(1.08);
}

.signature{
text-align:center;
font-size:28px;
font-weight:bold;
margin-top:20px;
}

  #hearts{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

/* 👇 Iske neeche paste karo */

.gallery{

opacity:0;

transform:translateY(40px);

transition:1.2s;

}

.gallery.show{

opacity:1;

transform:translateY(0);

}

.button{

opacity:0;

transform:scale(.7);

transition:1s;

}

.button.show{

opacity:1;

transform:scale(1);

}
  .petal {
  position: fixed;
  top: -10px;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50% 0 50% 50%;
  opacity: 0.8;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
  @keyframes fade {
  0% {opacity: 1; transform: scale(1);}
  100% {opacity: 0; transform: scale(2);}
}
#endScreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: black;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size: 30px;
  animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
  0% {transform: scale(1);}
  25% {transform: scale(1.1);}
  50% {transform: scale(1);}
  75% {transform: scale(1.1);}
  100% {transform: scale(1);}
}
</style>


</head>

<body>
  <div id="welcome">

<h1>❤️ Dear Wifey ❤️</h1>

<p>I made something special for you...</p>

<button onclick="startWebsite()">Open My Heart ❤️</button>

</div>

<div id="mainContent" style="display:none;">

<div class="container">

<div class="card">

<h1>Dear Wifey ❤️</h1>

<div class="message" id="typing"></div>



<div class="gallery" id="gallery" style="display:none;">

<img src="01542a02-8fff-44a4-93e7-900ad2af8fe9.jpeg" alt="Anniversary">

<img src="4ba16393-894c-48a9-8ad5-7b0ab8403fd9.jpeg" alt="Diwali">

<img src="5271a30c-ed11-4d75-9061-0583def9c32a.jpeg" alt="Beach Hug">

<img src="5b5e092c-e4f5-4a65-bbf9-6b4b05471e68.jpeg" alt="Beach Swing">

<img src="e94c1dd9-274d-4859-9933-3299c9e28be0.jpeg" alt="Goa Street">

</div>
<a href="#" class="button" id="forgiveBtn" onclick="forgive()" style="display:none;">

Will You Forgive Me? ❤️
</a>

<div class="signature">
Forever Yours,<br>
Sachin ❤️
</div>
  </div>

</div>
</div>
<div id="hearts"></div>
  
<div id="petals"></div>
  <div id="endScreen">
  <h1>❤️ I’m Sorry ❤️</h1>
</div>
<script>

const hearts = document.getElementById("hearts");

function createHeart(){

const heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top="-30px";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.opacity=Math.random();
heart.style.pointerEvents="none";

document.body.appendChild(heart);

let pos=-30;
let speed=2+Math.random()*3;

const fall=setInterval(()=>{

pos+=speed;

heart.style.top=pos+"px";

if(pos>window.innerHeight){

clearInterval(fall);

heart.remove();

}

},20);

}

setInterval(createHeart,500);
  function forgive(){

alert("Thank you Wifey ❤️\n\nI promise I'll never hurt you again.\n\nI love you forever. 🥹❤️");

}
  function startWebsite(){

document.getElementById("welcome").style.display="none";

document.getElementById("mainContent").style.display="block";

typeMessage();

}
  const text = `I know I hurt you with my words and actions.

I never wanted to hurt you.

I am really sorry I messed up last night.

I wanted to apologize to you.

I love you from the bottom of my heart. ❤️

Missing you so much... 🥹`;

let i = 0;

function typeMessage(){

if(i < text.length){

document.getElementById("typing").innerHTML +=
text.charAt(i) === "\n" ? "<br>" : text.charAt(i);

i++;

setTimeout(typeMessage,45);

}else{

const gallery = document.getElementById("gallery");

gallery.style.display = "grid";

setTimeout(() => {
gallery.classList.add("show");
},100);

const btn = document.getElementById("forgiveBtn");

btn.style.display = "block";

setTimeout(() => {
btn.classList.add("show");
},700);

}

}
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");

  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 8000);
}

setInterval(createPetal, 300);
document.addEventListener("mousemove", function(e) {
  const sparkle = document.createElement("div");
  sparkle.innerHTML = "✨";
  sparkle.style.position = "fixed";
  sparkle.style.left = e.clientX + "px";
  sparkle.style.top = e.clientY + "px";
  sparkle.style.pointerEvents = "none";
  sparkle.style.fontSize = "16px";
  sparkle.style.animation = "fade 1s linear forwards";

  document.body.appendChild(sparkle);

  setTimeout(() => sparkle.remove(), 1000);
});

</script>

</body>
</html>
